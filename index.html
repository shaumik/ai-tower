<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#05070d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NEURAL SIEGE — AI Tower Defense</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css?v=170">
</head>
<body>
<div id="app">

  <!-- ============ MAIN MENU ============ -->
  <section id="screen-menu" class="screen active">
    <div class="menu-bg" id="menu-bg-anim"></div>
    <div class="menu-inner">
      <div class="logo">
        <div class="logo-top">NEURAL</div>
        <div class="logo-bottom">SIEGE</div>
        <div class="logo-sub">AI TOWER DEFENSE</div>
      </div>
      <div class="menu-buttons">
        <button class="btn btn-primary btn-big" id="btn-play">DEPLOY</button>
        <button class="btn" id="btn-research">RESEARCH LAB</button>
        <button class="btn" id="btn-codex">THREAT CODEX</button>
        <button class="btn" id="btn-achievements">ACHIEVEMENTS</button>
        <button class="btn" id="btn-settings">SETTINGS</button>
      </div>
      <div class="menu-stats" id="menu-stats"></div>
    </div>
  </section>

  <!-- ============ LEVEL SELECT ============ -->
  <section id="screen-levels" class="screen">
    <header class="screen-head">
      <button class="btn btn-back" data-back="screen-menu">‹</button>
      <h1>SELECT NODE</h1>
      <div class="head-cores" id="levels-cores">◈ 0</div>
    </header>
    <div class="sector-tabs" id="sector-tabs"></div>
    <div class="levels-scroll"><div class="level-grid" id="level-grid"></div></div>
    <div class="level-detail" id="level-detail"></div>
  </section>

  <!-- ============ RESEARCH ============ -->
  <section id="screen-research" class="screen">
    <header class="screen-head">
      <button class="btn btn-back" data-back="screen-menu">‹</button>
      <h1>RESEARCH LAB</h1>
      <div class="head-cores" id="research-cores">◈ 0</div>
    </header>
    <p class="screen-hint">Spend Data Cores ◈ earned from victories on permanent upgrades.</p>
    <div class="research-scroll" id="research-list"></div>
  </section>

  <!-- ============ CODEX ============ -->
  <section id="screen-codex" class="screen">
    <header class="screen-head">
      <button class="btn btn-back" data-back="screen-menu">‹</button>
      <h1>CODEX</h1>
      <div></div>
    </header>
    <div class="codex-tabs">
      <button class="ctab active" data-ctab="threats">THREATS</button>
      <button class="ctab" data-ctab="towers">DEFENSES</button>
    </div>
    <div class="codex-scroll" id="codex-list"></div>
  </section>

  <!-- ============ ACHIEVEMENTS ============ -->
  <section id="screen-achievements" class="screen">
    <header class="screen-head">
      <button class="btn btn-back" data-back="screen-menu">‹</button>
      <h1>ACHIEVEMENTS</h1>
      <div id="ach-count"></div>
    </header>
    <div class="codex-scroll" id="ach-list"></div>
  </section>

  <!-- ============ SETTINGS ============ -->
  <section id="screen-settings" class="screen">
    <header class="screen-head">
      <button class="btn btn-back" data-back="screen-menu">‹</button>
      <h1>SETTINGS</h1>
      <div></div>
    </header>
    <div class="settings-list" id="settings-list"></div>
    <div class="settings-danger">
      <button class="btn btn-danger" id="btn-wipe">WIPE SAVE DATA</button>
      <p class="screen-hint">Version <span id="version-label"></span> · Works fully offline once loaded.</p>
    </div>
  </section>

  <!-- ============ GAME ============ -->
  <section id="screen-game" class="screen">
    <canvas id="game-canvas"></canvas>

    <div id="hud-top">
      <button class="hud-btn" id="btn-pause">☰</button>
      <div class="hud-stat" id="hud-lives"><span class="ico">⬢</span><span id="hud-lives-v">20</span></div>
      <div class="hud-stat" id="hud-cash"><span class="ico">¤</span><span id="hud-cash-v">0</span></div>
      <div class="hud-stat" id="hud-wave"><span id="hud-wave-v">1/10</span></div>
      <button class="hud-btn" id="btn-speed">1×</button>
    </div>

    <div id="phase-banner"></div>
    <div id="combo-ind"></div>
    <div id="chip-ind"></div>

    <div id="ability-bar">
      <div id="energy-bar"><div id="energy-fill"></div></div>
      <div id="ability-btns"></div>
    </div>
    <div id="boss-bar"><div id="boss-bar-name"></div><div class="boss-track"><div id="boss-bar-fill"></div></div></div>
    <div id="toast-zone"></div>

    <div id="place-actions">
      <div id="place-info"></div>
      <div class="pa-buttons">
        <button class="btn" id="btn-place-cancel">✕</button>
        <button class="btn btn-primary" id="btn-place-ok">✓ DEPLOY</button>
      </div>
    </div>

    <div id="wave-intel"></div>

    <div id="hud-bottom">
      <div id="build-bar"></div>
      <button class="btn btn-primary" id="btn-start-wave">▶ START WAVE</button>
    </div>

    <div id="tower-panel" class="sheet">
      <div class="sheet-grip"></div>
      <div id="tower-panel-body"></div>
    </div>

    <div id="build-panel" class="sheet">
      <div class="sheet-grip"></div>
      <div id="build-panel-body"></div>
    </div>

    <div id="pause-overlay" class="overlay">
      <div class="overlay-card">
        <h2>PAUSED</h2>
        <button class="btn btn-primary" id="btn-resume">RESUME</button>
        <button class="btn" id="btn-restart">RESTART NODE</button>
        <button class="btn" id="btn-quit">ABANDON</button>
        <div class="pause-toggles" id="pause-toggles"></div>
      </div>
    </div>

    <div id="end-overlay" class="overlay">
      <div class="overlay-card" id="end-card"></div>
    </div>

    <div id="chip-overlay" class="overlay">
      <div class="overlay-card" id="chip-card"></div>
    </div>
  </section>

</div>

<script src="js/ads.js?v=170"></script>
<script src="js/util.js?v=170"></script>
<script src="js/data.js?v=170"></script>
<script src="js/save.js?v=170"></script>
<script src="js/audio.js?v=170"></script>
<script src="js/maps.js?v=170"></script>
<script src="js/waves.js?v=170"></script>
<script src="js/entities.js?v=170"></script>
<script src="js/render.js?v=170"></script>
<script src="js/game.js?v=170"></script>
<script src="js/ui.js?v=170"></script>
<script src="js/main.js?v=170"></script>
</body>
</html>
